# All hyperparameters for a free-Colab T4 training run.
# Override any field from the CLI: --set train.epochs=10

data:
  root: /content/drive/MyDrive/fitter/data
  images_subdir: realsense_overhead          # <root>/realsense_overhead/<dish_id>/rgb.png
  metadata_files:
    - metadata/dish_metadata_cafe1.csv
    - metadata/dish_metadata_cafe2.csv
  splits_dir: dish_ids/splits
  train_split: rgb_train_ids.txt
  test_split: rgb_test_ids.txt
  val_fraction: 0.1                          # carve val out of train split
  image_size: 224
  num_workers: 2                             # Colab free has 2 vCPUs

targets:
  # Order matters — matches head output order and eval reporting.
  names: [calories, mass, fat, carb, protein]
  # CSV columns in Nutrition5k metadata (dish_metadata_cafe*.csv).
  csv_columns:
    calories: total_calories
    mass: total_mass
    fat: total_fat
    carb: total_carb
    protein: total_protein

model:
  backbone: efficientnet_b3
  pretrained: true
  dropout: 0.2
  hidden_dim: 512

train:
  epochs: 30
  batch_size: 32
  eval_batch_size: 64
  lr_backbone: 1.0e-4
  lr_head: 1.0e-3
  weight_decay: 0.05
  warmup_epochs: 2
  freeze_backbone_epochs: 2                  # head-only warmup
  amp: true
  seed: 42
  log_every: 20                              # steps

paths:
  ckpt_dir: /content/drive/MyDrive/fitter/checkpoints
  log_dir: /content/drive/MyDrive/fitter/logs
